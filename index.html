<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="calculator">
    <input type="text" id="display" class="display" readonly placeholder="0">

<div class="buttons">
<button class="smallmultiply" onclick="deleteLast()">x</button>
<button class="action" onclick="clearDisplay()">AC</button>
<button class="percent" onclick="percentage()">%</button>
<button class="division" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="multiplication" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="minus" onclick="append('-')">-</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="plus" onclick="append('+')">+</button>

<button onclick="toggleSign()">+/-</button>
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equals" onclick="calculate()">=</button>

</div>






</div>





    <script src="script.js"></script>
</body>
</html>
